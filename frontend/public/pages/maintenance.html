<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — Fleet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title"><i class="bi bi-tools me-2 text-primary"></i>Maintenance Schedule</span>
    </div>

    <div class="page-content">
      <div class="row g-3">
        <!-- Schedule Table -->
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">
              <h6>Schedule</h6>
              <div class="d-flex gap-2 align-items-center">
                <span class="badge" style="background:#fee2e2;color:#991b1b">■ Overdue (>3 days)</span>
                <span class="badge" style="background:#fef3c7;color:#92400e">■ Due within 7 days</span>
              </div>
            </div>
            <div class="card-body p-0">
              <table class="fleet-table" id="maintTable">
                <thead><tr>
                  <th>Vehicle</th><th>Type</th><th>Scheduled</th>
                  <th>Status</th><th>Technician</th><th>Action</th>
                </tr></thead>
                <tbody id="maintBody">
                  <tr><td colspan="6" class="text-center py-4">
                    <div class="spinner-border text-primary spinner-border-sm"></div>
                  </td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Alerts panel -->
        <div class="col-lg-4">
          <div class="card">
            <div class="card-header">
              <h6><i class="bi bi-bell-fill text-warning me-1"></i>Active Alerts</h6>
              <a href="/pages/alerts.html" class="btn btn-sm btn-outline-secondary">View all</a>
            </div>
            <div class="card-body p-2" id="alertsPanel">
              <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>
            </div>
          </div>

          <!-- Upcoming (7 days) summary -->
          <div class="card mt-3">
            <div class="card-header"><h6>Upcoming (7 days)</h6></div>
            <div class="card-body p-2" id="upcomingPanel">
              <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="maintStatusModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Update Status</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="maintStatusAlert" class="alert d-none"></div>
        <p class="text-muted small mb-3" id="maintStatusCurrent"></p>
        <div class="d-flex flex-column gap-2" id="maintStatusOptions"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/fleet-api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar(); initSidebar();

  let currentMaintId = null;

  async function loadAll() {
    await Promise.all([loadMaintenance(), loadAlerts()]);
  }

  async function loadMaintenance() {
    try {
      const list = await api.json('/maintenance');
      renderMaintTable(list || []);
      renderUpcoming(list || []);
    } catch (err) { showToast('Failed to load maintenance: ' + err.message, 'danger'); }
  }

  function renderMaintTable(data) {
    const tbody = document.getElementById('maintBody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state py-5"><i class="bi bi-tools d-block"></i>No records</div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(m => {
      const ds = m.display_status;
      const rowClass = ds === 'OVERDUE' ? 'maint-row-overdue'
                     : ds === 'DUE'     ? 'maint-row-due' : '';
      const indicator = ds === 'OVERDUE'
        ? '<i class="bi bi-exclamation-circle-fill text-danger me-1" title="Overdue"></i>'
        : ds === 'DUE'
        ? '<i class="bi bi-clock-fill text-warning me-1" title="Due soon"></i>' : '';

      return `
        <tr class="${rowClass}">
          <td>
            <strong>${m.license_plate}</strong>
            <br><small class="text-muted">${m.brand||''} ${m.model||''}</small>
          </td>
          <td><span class="badge bg-light text-dark border">${m.type}</span></td>
          <td>
            ${indicator}
            ${fmtDateTime(m.scheduled_at)}
          </td>
          <td>${statusBadge(ds)}</td>
          <td>${m.technician || '<span class="text-muted">—</span>'}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary"
                    onclick="openStatusModal('${m.id}','${m.status}')">
              <i class="bi bi-pencil"></i>
            </button>
          </td>
        </tr>`;
    }).join('');
  }

  function renderUpcoming(data) {
    const now     = new Date();
    const in7days = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
    const upcoming = data.filter(m => {
      const d = new Date(m.scheduled_at);
      return m.status === 'SCHEDULED' && d >= now && d <= in7days;
    });

    const el = document.getElementById('upcomingPanel');
    if (!upcoming.length) {
      el.innerHTML = '<div class="text-muted text-center py-3" style="font-size:13px">No upcoming maintenance</div>';
      return;
    }
    el.innerHTML = upcoming.map(m => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
        <div>
          <div style="font-size:13px;font-weight:600">${m.license_plate}</div>
          <div style="font-size:11px;color:var(--text-muted)">${m.type}</div>
        </div>
        <div style="font-size:12px;text-align:right">
          ${fmtDate(m.scheduled_at)}
        </div>
      </div>`).join('');
  }

  async function loadAlerts() {
    try {
      const alerts = await api.json('/alerts?affected_resource_type=vehicle');
      const el = document.getElementById('alertsPanel');
      const unread = (alerts||[]).filter(a => !a.is_read);
      if (!unread.length) {
        el.innerHTML = '<div class="empty-state py-4"><i class="bi bi-check-circle-fill d-block text-success"></i>No active alerts</div>';
        return;
      }
      el.innerHTML = unread.slice(0, 8).map(a => `
        <div class="alert-item alert-${a.severity.toLowerCase()} mb-2">
          <i class="bi bi-exclamation-triangle-fill alert-icon text-${a.severity==='CRITICAL'?'danger':'warning'}"></i>
          <div>
            <div style="font-weight:600;font-size:12px">${a.message}</div>
            <div style="font-size:11px;color:var(--text-muted)">${fmtDateTime(a.triggered_at)}</div>
          </div>
        </div>`).join('');
    } catch {}
  }

  function openStatusModal(id, currentStatus) {
    currentMaintId = id;
    document.getElementById('maintStatusCurrent').innerHTML = `Current: ${statusBadge(currentStatus)}`;
    document.getElementById('maintStatusAlert').classList.add('d-none');

    const next = currentStatus === 'SCHEDULED'    ? ['IN_PROGRESS']
               : currentStatus === 'IN_PROGRESS'  ? ['COMPLETED']
               : [];

    document.getElementById('maintStatusOptions').innerHTML = next.length
      ? next.map(s => `
          <button class="btn btn-outline-secondary w-100 text-start" onclick="doUpdateStatus('${s}')">
            ${statusBadge(s)} <small class="ms-2 text-muted">Change to ${s}</small>
          </button>`).join('')
      : '<p class="text-muted text-center">No further transitions available.</p>';

    new bootstrap.Modal(document.getElementById('maintStatusModal')).show();
  }

  async function doUpdateStatus(status) {
    try {
      await api.json(`/maintenance/${currentMaintId}/status`, {
        method: 'PATCH', body: JSON.stringify({ status }),
      });
      bootstrap.Modal.getInstance(document.getElementById('maintStatusModal')).hide();
      showToast(`Maintenance updated to ${status}`);
      loadMaintenance();
    } catch (err) {
      const el = document.getElementById('maintStatusAlert');
      el.className = 'alert alert-danger';
      el.textContent = err.message;
    }
  }

  // Apply filter from URL (e.g. ?filter=overdue from dashboard)
  const urlFilter = new URLSearchParams(window.location.search).get('filter');

  loadAll();
</script>
</body>
</html>
