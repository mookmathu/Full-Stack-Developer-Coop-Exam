<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Fleet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-placeholder"></div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title"><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</span>
      <div class="d-flex align-items-center gap-2">
        <span id="lastUpdated" class="text-muted" style="font-size:12px"></span>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadAll()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
    </div>

    <div class="page-content">

      <!-- Metric Cards -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <a class="metric-card" href="/pages/vehicles.html" id="cardVehicles">
            <div class="metric-icon" style="background:#dbeafe;color:#1d4ed8"><i class="bi bi-truck"></i></div>
            <div class="metric-value" id="metricVehicles">—</div>
            <div class="metric-label">Total Vehicles</div>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="metric-card" href="/pages/trips.html?status=IN_PROGRESS" id="cardTrips">
            <div class="metric-icon" style="background:#d1fae5;color:#065f46"><i class="bi bi-map"></i></div>
            <div class="metric-value" id="metricTrips">—</div>
            <div class="metric-label">Active Trips Today</div>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="metric-card" href="/pages/trips.html?status=COMPLETED" id="cardDistance">
            <div class="metric-icon" style="background:#ede9fe;color:#5b21b6"><i class="bi bi-geo-alt"></i></div>
            <div class="metric-value" id="metricDistance">—</div>
            <div class="metric-label">Total Distance Today (km)</div>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a class="metric-card" href="/pages/maintenance.html?filter=overdue" id="cardMaint">
            <div class="metric-icon" style="background:#fee2e2;color:#991b1b"><i class="bi bi-tools"></i></div>
            <div class="metric-value" id="metricMaint">—</div>
            <div class="metric-label">Maintenance Overdue</div>
          </a>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="row g-3 mb-4">
        <div class="col-md-5">
          <div class="card h-100">
            <div class="card-header"><h6>Vehicle Status</h6></div>
            <div class="card-body d-flex align-items-center justify-content-center" style="min-height:240px">
              <canvas id="statusChart" style="max-width:220px;max-height:220px"></canvas>
            </div>
          </div>
        </div>
        <div class="col-md-7">
          <div class="card h-100">
            <div class="card-header"><h6>Trip Distance — Last 7 Days</h6></div>
            <div class="card-body" style="min-height:240px">
              <canvas id="trendChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Row: Alerts + Active Trips -->
      <div class="row g-3">
        <div class="col-md-5">
          <div class="card">
            <div class="card-header">
              <h6><i class="bi bi-bell-fill text-warning me-1"></i>Unread Alerts</h6>
              <a href="/pages/alerts.html" class="btn btn-sm btn-outline-secondary">View all</a>
            </div>
            <div class="card-body p-2" id="alertPanel">
              <div class="empty-state py-4"><i class="bi bi-check-circle-fill d-block"></i>No active alerts</div>
            </div>
          </div>
        </div>
        <div class="col-md-7">
          <div class="card">
            <div class="card-header">
              <h6><i class="bi bi-map text-primary me-1"></i>Active Trips</h6>
              <a href="/pages/trips.html" class="btn btn-sm btn-outline-secondary">View all</a>
            </div>
            <div class="card-body p-0" id="activeTripsPanel">
              <div class="empty-state py-4"><i class="bi bi-map d-block"></i>No active trips</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /page-content -->
  </div><!-- /main -->
</div><!-- /layout -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/js/fleet-api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar();
  initSidebar();

  let statusChartInst = null, trendChartInst = null;

  async function loadAll() {
    try {
      const [summary, charts, alerts, trips] = await Promise.all([
        api.json('/dashboard/summary'),
        api.json('/dashboard/charts'),
        api.json('/alerts'),
        api.json('/trips?status=IN_PROGRESS'),
      ]);

      renderMetrics(summary);
      renderCharts(charts);
      renderAlerts(alerts?.filter(a => !a.is_read) || []);
      renderActiveTrips(trips || []);

      document.getElementById('lastUpdated').textContent =
        'Updated: ' + new Date().toLocaleTimeString('th-TH');
    } catch (err) {
      showToast('Failed to load dashboard: ' + err.message, 'danger');
    }
  }

  function renderMetrics(s) {
    document.getElementById('metricVehicles').textContent = s.total_vehicles ?? '—';
    document.getElementById('metricTrips').textContent    = s.active_trips_today ?? '—';
    document.getElementById('metricDistance').textContent = (s.total_distance_today_km ?? 0).toLocaleString();
    document.getElementById('metricMaint').textContent    = s.maintenance_overdue ?? '—';
    if (s.maintenance_overdue > 0) {
      document.getElementById('cardMaint').style.borderLeft = '4px solid var(--danger)';
    }
  }

  function renderCharts(data) {
    const statusColors = {
      ACTIVE:      '#10b981', IDLE:  '#94a3b8',
      MAINTENANCE: '#f59e0b', RETIRED: '#ef4444',
    };

    // Donut chart
    const byStatus = data.vehicles_by_status || [];
    if (statusChartInst) statusChartInst.destroy();
    statusChartInst = new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: byStatus.map(r => r.status),
        datasets: [{
          data: byStatus.map(r => r.count),
          backgroundColor: byStatus.map(r => statusColors[r.status] || '#94a3b8'),
          borderWidth: 2, borderColor: '#fff',
        }],
      },
      options: {
        cutout: '65%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } },
        responsive: true, maintainAspectRatio: false,
      },
    });

    // Line chart — last 7 days
    const trend = data.distance_trend_7d || [];
    const last7 = getLast7Days();
    const distMap = Object.fromEntries(trend.map(r => [r.date?.slice(0,10), r.total_km]));

    if (trendChartInst) trendChartInst.destroy();
    trendChartInst = new Chart(document.getElementById('trendChart'), {
      type: 'bar',
      data: {
        labels: last7.map(d => d.label),
        datasets: [{
          label: 'Distance (km)',
          data: last7.map(d => distMap[d.key] || 0),
          backgroundColor: '#bfdbfe', borderColor: '#1a56db',
          borderWidth: 2, borderRadius: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
          x: { grid: { display: false } },
        },
      },
    });
  }

  function getLast7Days() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      days.push({
        key:   d.toISOString().slice(0, 10),
        label: d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short' }),
      });
    }
    return days;
  }

  function renderAlerts(alerts) {
    const el = document.getElementById('alertPanel');
    if (!alerts.length) {
      el.innerHTML = '<div class="empty-state py-4"><i class="bi bi-check-circle-fill d-block text-success"></i>No active alerts</div>';
      return;
    }
    el.innerHTML = alerts.slice(0, 6).map(a => `
      <div class="alert-item alert-${a.severity.toLowerCase()}">
        <i class="bi bi-exclamation-triangle-fill alert-icon text-${a.severity==='CRITICAL'?'danger':'warning'}"></i>
        <div>
          <div style="font-weight:600;font-size:12px">${a.message}</div>
          <div style="font-size:11px;color:var(--text-muted)">${fmtDateTime(a.triggered_at)}</div>
        </div>
      </div>`).join('');
  }

  function renderActiveTrips(trips) {
    const el = document.getElementById('activeTripsPanel');
    if (!trips.length) {
      el.innerHTML = '<div class="empty-state py-4"><i class="bi bi-map d-block"></i>No active trips</div>';
      return;
    }
    el.innerHTML = `<table class="fleet-table">
      <thead><tr>
        <th>Trip ID</th><th>Vehicle</th><th>Route</th><th>Driver</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${trips.map(t => `
          <tr style="cursor:pointer" onclick="window.location='/pages/trips.html?id=${t.id}'">
            <td><code>${t.id}</code></td>
            <td>${t.license_plate}</td>
            <td><small>${t.origin} → ${t.destination}</small></td>
            <td>${t.driver_name}</td>
            <td>${statusBadge(t.status)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  }

  // Auto-refresh every 60s
  loadAll();
  setInterval(loadAll, 60000);
</script>
</body>
</html>
