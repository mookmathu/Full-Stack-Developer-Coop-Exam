<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log — Fleet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title"><i class="bi bi-journal-text me-2 text-primary"></i>Audit Log</span>
    </div>
    <div class="page-content">
      <div class="filter-bar">
        <select id="fAction" class="form-select" style="max-width:200px" onchange="loadLogs()">
          <option value="">All Actions</option>
          <option>LOGIN_SUCCESS</option><option>LOGIN_FAILED</option>
          <option>VEHICLE_CREATED</option><option>VEHICLE_UPDATED</option><option>VEHICLE_DELETED</option>
          <option>TRIP_CREATED</option><option>TRIP_COMPLETED</option>
          <option>CHECKPOINT_UPDATED</option>
        </select>
        <select id="fResType" class="form-select" style="max-width:160px" onchange="loadLogs()">
          <option value="">All Resources</option>
          <option value="vehicle">Vehicle</option>
          <option value="trip">Trip</option>
          <option value="checkpoint">Checkpoint</option>
        </select>
        <input type="date" id="fDateFrom" class="form-control" style="max-width:150px" onchange="loadLogs()">
        <input type="date" id="fDateTo"   class="form-control" style="max-width:150px" onchange="loadLogs()">
      </div>

      <div class="card">
        <div class="card-body p-0">
          <table class="fleet-table">
            <thead><tr>
              <th>Time</th><th>User</th><th>Action</th><th>Resource</th><th>Details</th>
            </tr></thead>
            <tbody id="auditBody">
              <tr><td colspan="5" class="text-center py-4">
                <div class="spinner-border text-primary spinner-border-sm"></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/fleet-api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar(); initSidebar();

  const ACTION_COLORS = {
    LOGIN_SUCCESS:'success', LOGIN_FAILED:'danger',
    VEHICLE_CREATED:'primary', VEHICLE_UPDATED:'info', VEHICLE_DELETED:'danger',
    TRIP_CREATED:'primary', TRIP_COMPLETED:'success', CHECKPOINT_UPDATED:'info',
  };

  async function loadLogs() {
    const qs = new URLSearchParams();
    const action   = document.getElementById('fAction').value;
    const resType  = document.getElementById('fResType').value;
    const dateFrom = document.getElementById('fDateFrom').value;
    const dateTo   = document.getElementById('fDateTo').value;
    if (action)   qs.set('action', action);
    if (resType)  qs.set('resource_type', resType);
    if (dateFrom) qs.set('date_from', dateFrom);
    if (dateTo)   qs.set('date_to', dateTo + ' 23:59:59');

    try {
      const logs = await api.json('/audit-logs?' + qs.toString()) || [];
      const tbody = document.getElementById('auditBody');
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state py-5"><i class="bi bi-journal d-block"></i>No logs found</div></td></tr>';
        return;
      }
      tbody.innerHTML = logs.map(l => {
        const color = ACTION_COLORS[l.action] || 'secondary';
        const changes = l.new_values
          ? `<small class="text-muted">${JSON.stringify(l.new_values).slice(0,60)}…</small>`
          : '';
        return `
          <tr>
            <td><small>${fmtDateTime(l.created_at)}</small></td>
            <td><code style="font-size:11px">${l.username || 'system'}</code></td>
            <td><span class="badge bg-${color}-subtle text-${color} border" style="font-size:10px">${l.action}</span></td>
            <td>${l.resource_type ? `<code style="font-size:11px">${l.resource_type}:${l.resource_id||''}</code>` : '—'}</td>
            <td>${changes}</td>
          </tr>`;
      }).join('');
    } catch (err) { showToast(err.message, 'danger'); }
  }

  loadLogs();
</script>
</body>
</html>
