<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drivers — Fleet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title"><i class="bi bi-person-badge me-2 text-primary"></i>Drivers</span>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addDriverModal">
        <i class="bi bi-plus-lg me-1"></i>Add Driver
      </button>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="card-body p-0">
          <table class="fleet-table">
            <thead><tr>
              <th>ID</th><th>Name</th><th>License No.</th><th>License Expires</th><th>Status</th>
            </tr></thead>
            <tbody id="driverBody">
              <tr><td colspan="5" class="text-center py-4">
                <div class="spinner-border text-primary spinner-border-sm"></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Driver Modal -->
<div class="modal fade" id="addDriverModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Driver</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="driverAlert" class="alert d-none"></div>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Full Name *</label>
            <input type="text" id="dName" class="form-control" placeholder="สมชาย ใจดี">
          </div>
          <div class="col-md-6">
            <label class="form-label">License Number *</label>
            <input type="text" id="dLicense" class="form-control" placeholder="DL-TH-001234">
          </div>
          <div class="col-md-6">
            <label class="form-label">License Expires *</label>
            <input type="date" id="dExpiry" class="form-control">
            <div class="form-text text-danger d-none" id="dExpiryError">
              <i class="bi bi-exclamation-circle me-1"></i>License must not be expired
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Phone</label>
            <input type="text" id="dPhone" class="form-control" placeholder="081-234-5678">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveDriver()">Save Driver</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/fleet-api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar(); initSidebar();

  // ตั้ง min date ของ License Expires = วันนี้ (ไม่ให้เลือกวันที่หมดอายุแล้ว)
  document.getElementById('addDriverModal').addEventListener('show.bs.modal', () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dExpiry').min = today;
    // reset form & error
    ['dName','dLicense','dExpiry','dPhone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('driverAlert').classList.add('d-none');
    document.getElementById('dExpiryError').classList.add('d-none');
    document.getElementById('dExpiry').classList.remove('is-invalid');
  });

  document.getElementById('dExpiry').addEventListener('change', function() {
    const today = new Date().toISOString().split('T')[0];
    const expired = this.value && this.value < today;
    document.getElementById('dExpiryError').classList.toggle('d-none', !expired);
    this.classList.toggle('is-invalid', expired);
  });

  async function loadDrivers() {
    try {
      const drivers = await api.json('/drivers');
      const tbody = document.getElementById('driverBody');
      if (!drivers.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state py-5"><i class="bi bi-person-badge d-block"></i>No drivers</div></td></tr>';
        return;
      }
      const today = new Date();
      tbody.innerHTML = drivers.map(d => {
        const expiry = new Date(d.license_expires_at);
        const daysLeft = Math.ceil((expiry - today) / (1000*60*60*24));
        const expiryBadge = daysLeft < 0
          ? '<span class="badge bg-danger">Expired</span>'
          : daysLeft <= 30
          ? `<span class="badge bg-warning text-dark">Expires in ${daysLeft}d</span>`
          : `<span class="text-muted">${fmtDate(d.license_expires_at)}</span>`;
        return `
          <tr>
            <td><code style="font-size:11px">${d.id}</code></td>
            <td><strong>${d.name}</strong><br><small class="text-muted">${d.phone||'—'}</small></td>
            <td><code>${d.license_number}</code></td>
            <td>${expiryBadge}</td>
            <td>${statusBadge(d.status)}</td>
          </tr>`;
      }).join('');
    } catch (err) { showToast(err.message, 'danger'); }
  }

  async function saveDriver() {
    const alertEl = document.getElementById('driverAlert');
    alertEl.classList.add('d-none');

    // ตรวจสอบใบขับขี่ไม่หมดอายุก่อน submit
    const expiry = document.getElementById('dExpiry').value;
    const today  = new Date().toISOString().split('T')[0];
    if (expiry && expiry < today) {
      document.getElementById('dExpiryError').classList.remove('d-none');
      document.getElementById('dExpiry').classList.add('is-invalid');
      return;
    }

    try {
      await api.json('/drivers', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('dName').value,
          license_number: document.getElementById('dLicense').value,
          license_expires_at: document.getElementById('dExpiry').value,
          phone: document.getElementById('dPhone').value,
        }),
      });
      bootstrap.Modal.getInstance(document.getElementById('addDriverModal')).hide();
      showToast('Driver added successfully!');
      loadDrivers();
    } catch (err) {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = err.message;
    }
  }

  loadDrivers();
</script>
</body>
</html>
