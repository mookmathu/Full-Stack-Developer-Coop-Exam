<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicles — Fleet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>

<body>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <div class="main">
      <div class="topbar">
        <span class="topbar-title"><i class="bi bi-truck me-2 text-primary"></i>Vehicles</span>
        <button class="btn btn-primary btn-sm" id="addVehicleBtn" data-bs-toggle="modal" data-bs-target="#addVehicleModal">
          <i class="bi bi-plus-lg me-1"></i>Add Vehicle
        </button>
      </div>

      <div class="page-content">
        <!-- Filters (state synced to URL) -->
        <div class="filter-bar">
          <input type="text" id="fSearch" class="form-control" style="max-width:220px"
            placeholder="Search plate, brand, model…">
          <select id="fStatus" class="form-select" style="max-width:150px">
            <option value="">All Status</option>
            <option>ACTIVE</option>
            <option>IDLE</option>
            <option>MAINTENANCE</option>
            <option>RETIRED</option>
          </select>
          <select id="fType" class="form-select" style="max-width:140px">
            <option value="">All Types</option>
            <option>TRUCK</option>
            <option>VAN</option>
            <option>MOTORCYCLE</option>
            <option>PICKUP</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" onclick="resetFilters()">
            <i class="bi bi-x-lg"></i> Reset
          </button>
          <span id="resultCount" class="text-muted ms-auto" style="font-size:13px"></span>
        </div>

        <!-- Vehicle Table -->
        <div class="card">
          <div class="card-body p-0 position-relative">
            <div id="loadingOverlay" class="loading-overlay d-none">
              <div class="spinner-border text-primary"></div>
            </div>
            <table class="fleet-table" id="vehicleTable">
              <thead>
                <tr>
                  <th>Vehicle ID</th>
                  <th>Plate</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th>Driver</th>
                  <th>Mileage (km)</th>
                  <th>Next Service</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="vehicleBody">
                <tr>
                  <td colspan="8" class="text-center py-5 text-muted">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Vehicle Modal -->
  <div class="modal fade" id="addVehicleModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Vehicle</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="addVehicleAlert" class="alert d-none"></div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">License Plate *</label>
              <input type="text" id="vLicensePlate" class="form-control" placeholder="กข-1234">
            </div>
            <div class="col-6">
              <label class="form-label">Type *</label>
              <select id="vType" class="form-select">
                <option value="">Select type</option>
                <option>TRUCK</option>
                <option>VAN</option>
                <option>MOTORCYCLE</option>
                <option>PICKUP</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Brand</label>
              <input type="text" id="vBrand" class="form-control" placeholder="Isuzu">
            </div>
            <div class="col-6">
              <label class="form-label">Model</label>
              <input type="text" id="vModel" class="form-control" placeholder="D-Max">
            </div>
            <div class="col-6">
              <label class="form-label">Year</label>
              <input type="number" id="vYear" class="form-control" placeholder="2024" min="2000" max="2030">
            </div>
            <div class="col-6">
              <label class="form-label">Fuel Type</label>
              <select id="vFuelType" class="form-select">
                <option value="">Select fuel</option>
                <option>DIESEL</option>
                <option>GASOLINE</option>
                <option>ELECTRIC</option>
                <option>HYBRID</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label">Mileage (km)</label>
              <input type="number" id="vMileage" class="form-control" value="0" min="0">
            </div>
            <div class="col-4">
              <label class="form-label">Last Service (km)</label>
              <input type="number" id="vLastService" class="form-control" value="0" min="0">
            </div>
            <div class="col-4">
              <label class="form-label">Next Service (km)</label>
              <input type="number" id="vNextService" class="form-control" value="0" min="0">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="saveVehicleBtn" onclick="saveVehicle()">
            <span id="saveVehicleSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
            Save Vehicle
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Change Modal -->
  <div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Change Status</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="statusModalAlert" class="alert d-none"></div>
          <p class="text-muted mb-3" id="currentStatusText"></p>
          <div id="statusOptions" class="d-flex flex-column gap-2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div class="modal fade" id="historyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Vehicle History — <span id="historyVehicleId"></span></h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0" id="historyBody">
          <div class="text-center py-4">
            <div class="spinner-border text-primary"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/fleet-api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    renderSidebar(); initSidebar();

    // ซ่อนปุ่ม Add Vehicle ถ้าไม่ใช่ admin
    const _user = getCurrentUser();
    const _addBtn = document.getElementById('addVehicleBtn');
    if (_addBtn && _user?.role !== 'admin') {
      _addBtn.style.display = 'none';
    }

    const STATUS_TRANSITIONS = {
      IDLE: ['ACTIVE', 'MAINTENANCE', 'RETIRED'],
      ACTIVE: ['IDLE', 'MAINTENANCE'],
      MAINTENANCE: ['IDLE'],
      RETIRED: [],
    };

    let currentStatusVehicleId = null;
    let debounceTimer = null;

    // ─── Filter state persisted in URL ───────────────────────
    function getFilters() {
      const p = new URLSearchParams(window.location.search);
      return {
        q: p.get('q') || '',
        status: p.get('status') || '',
        type: p.get('type') || '',
      };
    }

    function applyFiltersToUI(f) {
      document.getElementById('fSearch').value = f.q;
      document.getElementById('fStatus').value = f.status;
      document.getElementById('fType').value = f.type;
    }

    function pushFiltersToURL(f) {
      const p = new URLSearchParams();
      if (f.q) p.set('q', f.q);
      if (f.status) p.set('status', f.status);
      if (f.type) p.set('type', f.type);
      history.replaceState(null, '', '?' + p.toString());
    }

    function resetFilters() {
      history.replaceState(null, '', '?');
      applyFiltersToUI({ q: '', status: '', type: '' });
      loadVehicles();
    }

    // ─── Load vehicles ────────────────────────────────────────
    async function loadVehicles() {
      const f = getFilters();
      const p = new URLSearchParams(f);
      document.getElementById('loadingOverlay').classList.remove('d-none');

      try {
        const vehicles = await api.json('/vehicles?' + p.toString());
        renderTable(vehicles || []);
        document.getElementById('resultCount').textContent = `${(vehicles || []).length} vehicle(s)`;
      } catch (err) {
        showToast('Failed to load vehicles: ' + err.message, 'danger');
      } finally {
        document.getElementById('loadingOverlay').classList.add('d-none');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('vehicleBody');
      const isAdmin = _user?.role === 'admin';
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><i class="bi bi-truck d-block"></i>No vehicles found</div></td></tr>';
        return;
      }
      tbody.innerHTML = data.map(v => {
        const mileagePct = v.next_service_km > 0
          ? Math.min(100, Math.round((v.mileage_km / v.next_service_km) * 100))
          : 0;
        const mileageColor = mileagePct >= 90 ? 'danger' : mileagePct >= 75 ? 'warning' : 'success';
        return `
      <tr>
        <td><code>${v.id}</code></td>
        <td><strong>${v.license_plate}</strong><br><small class="text-muted">${v.brand || ''} ${v.model || ''} ${v.year || ''}</small></td>
        <td><span class="badge bg-light text-dark border">${v.type}</span></td>
        <td>${statusBadge(v.status)}</td>
        <td>${v.driver_name || '<span class="text-muted">—</span>'}</td>
        <td>
          ${v.mileage_km?.toLocaleString()} km
          <div class="progress mt-1" style="height:4px;width:80px">
            <div class="progress-bar bg-${mileageColor}" style="width:${mileagePct}%"></div>
          </div>
        </td>
        <td>${v.next_service_km?.toLocaleString()} km</td>
        <td>
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary" onclick="openStatusModal('${v.id}','${v.status}')" title="Change status">
              <i class="bi bi-arrow-left-right"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="openHistory('${v.id}')" title="History">
              <i class="bi bi-clock-history"></i>
            </button>
            ${isAdmin ? `
            <button class="btn btn-sm btn-outline-danger" onclick="deleteVehicle('${v.id}')" title="Delete">
              <i class="bi bi-trash"></i>
            </button>` : ''}
          </div>
        </td>
      </tr>`;
      }).join('');
    }

    // ─── Filter listeners ─────────────────────────────────────
    ['fSearch'].forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        const f = getFilters(); f.q = e.target.value;
        pushFiltersToURL(f);
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(loadVehicles, 300);
      });
    });
    ['fStatus', 'fType'].forEach(id => {
      document.getElementById(id).addEventListener('change', (e) => {
        const f = getFilters();
        if (id === 'fStatus') f.status = e.target.value;
        if (id === 'fType') f.type = e.target.value;
        pushFiltersToURL(f);
        loadVehicles();
      });
    });

    // ─── Add Vehicle ──────────────────────────────────────────
    async function saveVehicle() {
      const btn = document.getElementById('saveVehicleBtn');
      const sp = document.getElementById('saveVehicleSpinner');
      const alertEl = document.getElementById('addVehicleAlert');
      alertEl.classList.add('d-none');
      btn.disabled = true; sp.classList.remove('d-none');

      try {
        await api.json('/vehicles', {
          method: 'POST',
          body: JSON.stringify({
            license_plate: document.getElementById('vLicensePlate').value,
            type: document.getElementById('vType').value,
            brand: document.getElementById('vBrand').value,
            model: document.getElementById('vModel').value,
            year: +document.getElementById('vYear').value || null,
            fuel_type: document.getElementById('vFuelType').value || null,
            mileage_km: +document.getElementById('vMileage').value,
            last_service_km: +document.getElementById('vLastService').value,
            next_service_km: +document.getElementById('vNextService').value,
          }),
        });
        bootstrap.Modal.getInstance(document.getElementById('addVehicleModal')).hide();
        showToast('Vehicle added successfully!');
        loadVehicles();
      } catch (err) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = err.message;
      } finally {
        btn.disabled = false; sp.classList.add('d-none');
      }
    }

    // ─── Delete Vehicle ───────────────────────────────────────
    async function deleteVehicle(id) {
      if (!confirm(`Delete vehicle ${id}?`)) return;
      try {
        await api.json(`/vehicles/${id}`, { method: 'DELETE' });
        showToast('Vehicle deleted');
        loadVehicles();
      } catch (err) {
        showToast(err.message, 'danger');
      }
    }

    // ─── Status Modal ─────────────────────────────────────────
    function openStatusModal(id, currentStatus) {
      currentStatusVehicleId = id;
      const allowed = STATUS_TRANSITIONS[currentStatus] || [];
      document.getElementById('currentStatusText').innerHTML =
        `Current: ${statusBadge(currentStatus)}`;

      const container = document.getElementById('statusOptions');
      document.getElementById('statusModalAlert').classList.add('d-none');

      if (!allowed.length) {
        container.innerHTML = '<p class="text-muted text-center">No further status transitions available.</p>';
      } else {
        container.innerHTML = allowed.map(s => `
        <button class="btn btn-outline-secondary w-100 text-start"
                onclick="doStatusChange('${s}')">
          ${statusBadge(s)} <small class="ms-2 text-muted">Change to ${s}</small>
        </button>`).join('');
      }
      new bootstrap.Modal(document.getElementById('statusModal')).show();
    }

    async function doStatusChange(newStatus) {
      const alertEl = document.getElementById('statusModalAlert');
      alertEl.classList.add('d-none');
      try {
        await api.json(`/vehicles/${currentStatusVehicleId}/status`, {
          method: 'PATCH', body: JSON.stringify({ status: newStatus }),
        });
        bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
        showToast(`Status changed to ${newStatus}`);
        loadVehicles();
      } catch (err) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = err.message;
      }
    }

    // ─── History Modal ────────────────────────────────────────
    async function openHistory(id) {
      document.getElementById('historyVehicleId').textContent = id;
      document.getElementById('historyBody').innerHTML =
        '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
      new bootstrap.Modal(document.getElementById('historyModal')).show();

      try {
        const history = await api.json(`/vehicles/${id}/history`);
        document.getElementById('historyBody').innerHTML = renderHistory(history);
      } catch (err) {
        document.getElementById('historyBody').innerHTML =
          `<div class="p-4 text-danger">${err.message}</div>`;
      }
    }

    function renderHistory(items) {
      if (!items.length) return '<div class="empty-state py-5"><i class="bi bi-clock-history d-block"></i>No history yet</div>';
      return `<table class="fleet-table">
      <thead><tr><th>Date</th><th>Type</th><th>Details</th><th>Status</th></tr></thead>
      <tbody>${items.map(i => `
        <tr>
          <td>${fmtDate(i.date)}</td>
          <td><span class="badge ${i.type === 'trip' ? 'bg-primary' : 'bg-warning text-dark'}">${i.type.toUpperCase()}</span></td>
          <td>${i.type === 'trip'
        ? `${i.origin || ''} → ${i.destination || ''} (${i.distance_km || '?'} km)`
        : `${i.maintenance_type || ''} — ${i.technician || ''}`}
          </td>
          <td>${statusBadge(i.status)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
    }

    // ─── Init ─────────────────────────────────────────────────
    const initFilters = getFilters();
    applyFiltersToUI(initFilters);
    loadVehicles();
  </script>
</body>

</html>
